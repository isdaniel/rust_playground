name: workflow

on:
  schedule:
    - cron: '0 */45 * * * ?'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-22.04 , ubuntu-24.04,  macos-14, ubuntu-22.04-arm ,ubuntu-24.04-arm ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Build project
        working-directory: pg2any-example
        run: cargo build --release --verbose
